openapi: 3.0.1
info:
  title: fridge API
  description: 백엔드 소스 코드 기반 fridge API 명세서 (상세 응답 구조 반영)
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # 1. Auth 관련 DTO (BaseResponse 없이 직접 반환)
    TokenRes:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        memberId: { type: integer, format: int64 }
        nickname: { type: string }

    # 2. Fridge 관련 DTO (BaseResponse 없이 직접 반환)
    IngredientRes:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        quantity: { type: string }
        storageCategory: { type: string }
        fridgeSlot: { type: string, nullable: true }
        inputMethod: { type: string }

    OcrAutoPlaceRes:
      type: object
      properties:
        rawText: { type: string }
        saved: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }
        placed:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              storageCategory: { type: string }
              fridgeSlot: { type: string }
        unplaced:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              reason: { type: string }

    # 3. 공통 응답 구조 (Member, Recipe 도메인 사용)
    BaseResponse:
      type: object
      properties:
        isSuccess: { type: boolean }
        code: { type: string }
        message: { type: string }

    # 4. Recipe 관련 DTO
    RecipeDTO:
      type: object
      properties:
        recipeId: { type: integer, format: int64 }
        title: { type: string }
        description: { type: string }
        mainImage: { type: string }
        cookTime: { type: string }
        difficulty: { type: string }
        servings: { type: integer }
        missingIngredients: { type: array, items: { type: string } }

security:
  - bearerAuth: []

paths:
  # === Auth (인증) ===
  /auth/login/kakao:
    post:
      tags: [auth]
      summary: 카카오 로그인 및 회원가입
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                redirectUri: { type: string }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenRes' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: 토큰 재발급
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenRes' }

  /auth/logout:
    post:
      tags: [auth]
      summary: 로그아웃
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: 성공

  # === Members (회원) ===
  /users/me:
    get:
      tags: [members]
      summary: 내 정보 조회
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          memberId: { type: integer, format: int64 }
                          nickname: { type: string }
                          email: { type: string }
                          profileImageUrl: { type: string }

  /users/me/preferences:
    patch:
      tags: [members]
      summary: 건강 정보 및 기호 수정
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                allergies: { type: array, items: { type: string } }
                dislikes: { type: array, items: { type: string } }
                age: { type: string }
                gender: { type: string }
      responses:
        "200":
          description: 성공

  /users/onboarding/check:
    get:
      tags: [members]
      summary: 온보딩 완료 여부 조회
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          isOnboarded: { type: boolean }
                          memberId: { type: integer, format: int64 }

  # === Fridge (냉장고) ===
  /fridge:
    patch:
      tags: [fridge]
      summary: "냉장고 재료 목록 조회 (주의: PATCH 메서드 사용)"
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }
    post:
      tags: [fridge]
      summary: 재료 수동 추가 (단일)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                quantity: { type: string }
                expiryDate: { type: string, format: date }
                storageCategory: { type: string }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IngredientRes' }

  /fridge/ocr-auto-place:
    post:
      tags: [fridge]
      summary: OCR 인식 및 자동 배치 저장
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OcrAutoPlaceRes' }

  /fridge/{ingredientId}:
    delete:
      tags: [fridge]
      summary: 재료 삭제
      parameters:
        - name: ingredientId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204":
          description: 삭제 성공

  # === Recipes (레시피) ===
  /recipes/recommend/fridge:
    get:
      tags: [recipes]
      summary: 맞춤 레시피 추천
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }

  /recipes/recommend/fridge/missing:
    get:
      tags: [recipes]
      summary: 부족한 재료 기반 추천
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }

  /recipes/recommend/{recipeId}:
    get:
      tags: [recipes]
      summary: 레시피 상세 조회
      parameters:
        - name: recipeId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: 성공

  /recipes/recommend/search:
    get:
      tags: [recipes]
      summary: 레시피 검색
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: excludeAllergy
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: 성공

  /recipes/recommend/{recipeId}/scrap:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [recipes]
      summary: 레시피 찜하기
      responses:
        "200":
          description: TODO - 백엔드 응답 스펙 확인 필요
    delete:
      tags: [recipes]
      summary: 레시피 찜 취소
      responses:
        "200":
          description: TODO - 백엔드 응답 스펙 확인 필요
