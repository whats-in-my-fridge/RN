openapi: 3.0.1
info:
  title: fridge API
  description: 백엔드 소스 코드 기반 fridge API 명세서 (최신 업데이트 반영, FCM 제외)
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ==========================
    # 1. 공통 응답 구조
    # ==========================
    BaseResponse:
      type: object
      properties:
        isSuccess: { type: boolean, example: true }
        code: { type: string, example: "COMMON_200" }
        message: { type: string, example: "성공입니다." }

    # ==========================
    # 2. Auth 관련 DTO
    # ==========================
    KakaoLoginReq:
      type: object
      properties:
        accessToken: { type: string, description: "카카오 API를 통해 발급받은 액세스 토큰" }

    AuthUser:
      type: object
      properties:
        memberId: { type: integer, format: int64 }
        nickname: { type: string }

    LoginRes:
      type: object
      properties:
        user: { $ref: '#/components/schemas/AuthUser' }
        token: { type: string, description: "서비스 Access Token" }

    TokenRes:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        memberId: { type: integer, format: int64 }
        nickname: { type: string }

    RefreshReq:
      type: object
      properties:
        refreshToken: { type: string }

    LogoutReq:
      type: object
      properties:
        refreshToken: { type: string }

    # ==========================
    # 3. Member 관련 DTO
    # ==========================
    UserInfoDTO:
      type: object
      properties:
        memberId: { type: integer, format: int64 }
        nickname: { type: string }
        email: { type: string, nullable: true }
        profileImageUrl: { type: string, nullable: true }
        allergies: { type: array, items: { type: string } }
        dislikedIngredients: { type: array, items: { type: string } }

    UserPreferencesDTO:
      type: object
      properties:
        allergies: { type: array, items: { type: string } }
        dislikedIngredients: { type: array, items: { type: string } }
        age: { type: string, nullable: true }
        gender: { type: string, nullable: true }

    ScrapRecipeDTO:
      type: object
      properties:
        recipeId: { type: integer, format: int64 }
        title: { type: string }
        thumbnailUrl: { type: string }

    UserScrapsDTO:
      type: object
      properties:
        scrapList: { type: array, items: { $ref: '#/components/schemas/ScrapRecipeDTO' } }

    OnboardingStatusDTO:
      type: object
      properties:
        isOnboarded: { type: boolean }
        memberId: { type: integer, format: int64 }

    # ==========================
    # 4. Fridge 관련 DTO
    # ==========================
    IngredientRes:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        quantity: { type: string, nullable: true }
        storageCategory: { type: string }
        fridgeSlot: { type: string, nullable: true, description: "냉장고 칸 enum" }
        inputMethod: { type: string, description: "MANUAL 또는 OCR" }

    AddIngredientReq:
      type: object
      properties:
        name: { type: string }
        quantity: { type: string }
        expiryDate: { type: string, format: date, example: "2025-12-19" }
        storageCategory: { type: string }

    FridgeListRes:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }

    BatchAddReq:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AddIngredientReq' } }

    BatchAddRes:
      type: object
      properties:
        saved: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }

    AutoPlaceRes:
      type: object
      properties:
        placed: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }
        unplacedIds: { type: array, items: { type: integer, format: int64 } }

    AutoPlaceLlmRes:
      type: object
      properties:
        placed:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              storageCategory: { type: string }
              fridgeSlot: { type: string }
        unplaced:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              reason: { type: string }

    OcrRes:
      type: object
      properties:
        saved: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }

    OcrAutoPlaceRes:
      type: object
      properties:
        rawText: { type: string, nullable: true }
        saved: { type: array, items: { $ref: '#/components/schemas/IngredientRes' } }
        placed:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              storageCategory: { type: string }
              fridgeSlot: { type: string }
        unplaced:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              reason: { type: string }

    # ==========================
    # 5. Recipe & Agent 관련 DTO
    # ==========================
    RecipeIngredientDTO:
      type: object
      properties:
        name: { type: string }
        amount: { type: string, nullable: true }
        bundle: { type: string, nullable: true }

    RecipeStepDTO:
      type: object
      properties:
        order: { type: integer }
        content: { type: string }
        image: { type: string }

    RecipeDTO:
      type: object
      properties:
        recipeId: { type: integer, format: int64 }
        title: { type: string }
        description: { type: string }
        mainImage: { type: string }
        cookTime: { type: string }
        difficulty: { type: string }
        servings: { type: string }
        ingredients: { type: array, items: { $ref: '#/components/schemas/RecipeIngredientDTO' } }
        missingIngredients: { type: array, items: { type: string } }
        isScrapped: { type: boolean }

    RecipeInfoDTO:
      type: object
      properties:
        recipeId: { type: integer, format: int64 }
        title: { type: string }
        description: { type: string }
        mainImage: { type: string }
        servings: { type: string }
        cookTime: { type: string }
        difficulty: { type: string }
        ingredients: { type: array, items: { $ref: '#/components/schemas/RecipeIngredientDTO' } }
        steps: { type: array, items: { $ref: '#/components/schemas/RecipeStepDTO' } }
        isScrapped: { type: boolean }

    RecipeScrapDTO:
      type: object
      properties:
        scrapId: { type: integer, format: int64 }
        recipeId: { type: integer, format: int64 }
        memberId: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }

    AgentAskReq:
      type: object
      properties:
        query: { type: string }

    AgentAskRes:
      type: object
      properties:
        answer: { type: string }
        recipes: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }
        rewrittenQueries: { type: array, items: { type: string } }
        usedRetrieval: { type: boolean }
        usedRerank: { type: boolean }

    # ==========================
    # 6. Experiment 관련 DTO
    # ==========================
    ExperimentRetrieveReq:
      type: object
      properties:
        mode: { type: string, description: "DENSE, HYBRID, HYBRID_RERANK, HYBRID_RERANK_FUSION, AGENTIC" }
        query: { type: string }
        topK: { type: integer, example: 50 }
        memberId: { type: integer, format: int64, example: 1 }
        rewrittenQuery: { type: string }

    ExperimentRetrieveRes:
      type: object
      properties:
        recipeIds: { type: array, items: { type: integer, format: int64 } }
        rewrittenQueries: { type: array, items: { type: string } }
        answer: { type: string, nullable: true }

    ExperimentRewriteReq:
      type: object
      properties:
        query: { type: string }

    ExperimentRewriteRes:
      type: object
      properties:
        rewritten_queries: { type: array, items: { type: string } }

    ExperimentRecipeItem:
      type: object
      properties:
        recipeId: { type: integer, format: int64 }
        title: { type: string }

    ExperimentRecipeListRes:
      type: object
      properties:
        recipes: { type: array, items: { $ref: '#/components/schemas/ExperimentRecipeItem' } }

security:
  - bearerAuth: []

paths:
  # =========================================================
  # Auth (인증) - 직접 반환 (ResponseEntity)
  # =========================================================
  /auth/login/kakao:
    post:
      tags: [Auth]
      summary: 카카오 로그인 및 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KakaoLoginReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginRes' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenRes' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutReq' }
      responses:
        "200":
          description: 성공

  # =========================================================
  # Members (회원) - BaseResponse 래핑
  # =========================================================
  /users/me:
    get:
      tags: [Members]
      summary: 내 정보 조회
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/UserInfoDTO' }

  /users/me/preferences:
    patch:
      tags: [Members]
      summary: 건강 정보 및 기호 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserPreferencesDTO' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/UserPreferencesDTO' }

  /users/me/scraps:
    get:
      tags: [Members]
      summary: 찜한 레시피 목록 조회
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/UserScrapsDTO' }

  /users/onboarding/check:
    get:
      tags: [Members]
      summary: 온보딩 여부 확인
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/OnboardingStatusDTO' }

  # =========================================================
  # Fridge (냉장고) - 직접 반환 (ResponseEntity)
  # =========================================================
  /fridge:
    get:
      tags: [Fridge]
      summary: 냉장고 재료 목록 조회
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FridgeListRes' }
    post:
      tags: [Fridge]
      summary: 재료 수동 추가 (단일)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddIngredientReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IngredientRes' }

  /fridge/batch:
    post:
      tags: [Fridge]
      summary: 재료 수동 추가 (다중 일괄)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchAddReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchAddRes' }

  /fridge/ocr:
    post:
      tags: [Fridge]
      summary: 영수증/이미지 OCR 재료 인식 후 저장
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OcrRes' }

  /fridge/auto-place:
    post:
      tags: [Fridge]
      summary: 룰 기반 자동 배치
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoPlaceRes' }

  /fridge/auto-place-llm:
    post:
      tags: [Fridge]
      summary: LLM 기반 자동 배치
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoPlaceLlmRes' }

  /fridge/ocr-auto-place:
    post:
      tags: [Fridge]
      summary: OCR 인식 후 LLM 자동 배치 동시 수행
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OcrAutoPlaceRes' }

  /fridge/{ingredientId}:
    delete:
      tags: [Fridge]
      summary: 재료 삭제
      parameters:
        - name: ingredientId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204":
          description: 삭제 성공 (Content 없음)

  # =========================================================
  # Recipes (레시피 & 에이전트) - BaseResponse 래핑
  # =========================================================
  /recipes/recommend/fridge:
    get:
      tags: [Recipes]
      summary: 맞춤 레시피 추천
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }

  /recipes/recommend/fridge/missing:
    get:
      tags: [Recipes]
      summary: 부족 재료 기반 레시피 추천
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }

  /recipes/recommend/scraps:
    get:
      tags: [Recipes]
      summary: 찜한 레시피 기반 추천
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }

  /recipes/{recipeId}:
    get:
      tags: [Recipes]
      summary: 레시피 상세 조회
      parameters:
        - name: recipeId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/RecipeInfoDTO' }

  /recipes/recommend/search:
    get:
      tags: [Recipes]
      summary: 레시피 검색
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string }
        - name: excludeAllergy
          in: query
          schema: { type: boolean }
        - name: excludeIngredients
          in: query
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
          description: 기피 식재료 리스트 (요청 시 추가 필터링용)
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { type: array, items: { $ref: '#/components/schemas/RecipeDTO' } }

  /recipes/{recipeId}/scrap:
    post:
      tags: [Recipes]
      summary: 레시피 찜하기
      parameters:
        - name: recipeId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/RecipeScrapDTO' }

    delete:
      tags: [Recipes]
      summary: 레시피 찜 취소
      parameters:
        - name: recipeId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'

  /recipes/agent/ask:
    post:
      tags: [Recipes]
      summary: Agentic RAG 레시피 질의
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentAskReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/AgentAskRes' }

  # =========================================================
  # Experiment (실험용 API) - BaseResponse 래핑
  # =========================================================
  /recipes/experiment/retrieve:
    post:
      tags: [Experiment]
      summary: 모드별 Retrieval 실험
      description: DENSE, HYBRID, HYBRID_RERANK, HYBRID_RERANK_FUSION, AGENTIC 모드별 검색 결과 순서 검증
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExperimentRetrieveReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/ExperimentRetrieveRes' }

  /recipes/experiment/rewrite:
    post:
      tags: [Experiment]
      summary: Query Rewriting 실험
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExperimentRewriteReq' }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/ExperimentRewriteRes' }

  /recipes/experiment/recipes:
    get:
      tags: [Experiment]
      summary: 라벨링용 전체 레시피 목록 조회
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/ExperimentRecipeListRes' }
